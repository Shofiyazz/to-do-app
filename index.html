<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <header>
        <div class="profile">
            <img src="./images/ellipse.png" alt="profile pic">

            <div class="profile-info">
            <h2>Your Name</h2>
            <p>Your Bio</p>
            </div>
        </div>

        <button class="notif-btn">
           <span class="material-symbols-outlined">
            notifications
            </span>
        </button>
    </header>

    <main>
        <section class="information">

            <div class="time">

                <span class="material-symbols-outlined">
                calendar_month
                </span>

                <div class="date-time">
                <h4>Day, DayNumber, Month, Year</h4>
                <p>Time</p>
                </div> 
            </div>

            <div class="quotes">
                <p>
                    Rencanakan harimu dengan produktif!
                </p>
            </div>
            
        </section> 

        <section class="input-task">
            <form>
                <label for="input-box">Tambah Tugas Baru</label>

                <textarea 
                id="input-box"
                rows="4" 
                cols="30" 
                placeholder="Tulis tugasmu di sini..."></textarea>

                <div class="priority-container">
                    <h2>Prioritas</h2>
                    <div class="button-row">
                        <div class="priority-btn">
                            <button type="button" class="priority-btn-low">Low</button>
                            <button type="button" class="priority-btn-med">Medium</button>
                            <button type="button" class="priority-btn-high">High</button>
                        </div>

                        <button class="submit-btn">
                           + Submit
                        </button>
                    </div>
                </div>
            </form>
        </section>

        <section class="task-list">
            <!-- <section class="task-card overdue-card">
                <div class="card-header"> 
                    <h2>OVERDUE</h2> 
                    <span class="task-left">4</span> 
                </div>

                <article class="task-item">
                    <label>
                        <input type="checkbox">
                        Task1
                    </label>
                    
                    <span class="priority-badge">High</span>
                </article>

                <button class="delete-section">
                    <span class="material-symbols-outlined">
                    delete
                    </span>
                </button>
            </section> -->
            
            <section class="task-card todo-card">
                <div class="card-header"> 
                    <h2>TO DO</h2> 
                    <span class="task-left">4</span> 
                </div>

                <article class="task-item">
                    <label>
                        <input type="checkbox">
                        Task2
                    </label>

                    <div class="task-right">
                        <span class="priority-badge">High</span>

                        <button class="delete-btn">
                            <span class="material-symbols-outlined">
                                delete
                            </span>
                        </button>
                    </div>                      
                </article>
            </section>

            <section class="task-card done-card">
                <div class="card-header"> 
                    <h2>DONE</h2> 
                    <span class="task-left">4</span> 
                </div>

                <article class="task-item">
                    <label>
                        <input type="checkbox">
                        Task3
                    </label>

                    <div class="task-right">
                        <span class="priority-badge">High</span>

                        <button class="delete-btn">
                            <span class="material-symbols-outlined">
                                delete
                            </span>
                        </button>
                    </div>   
                </article>
            </section>
        </section>

        <button class="delete-global">
            <span class="material-symbols-outlined">
            delete
            </span>
            <span>Delete All</span>
        </button>
    </main>
</body>
</html>
